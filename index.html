<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nokrify Lead Scraper - Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            background-image: radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.1) 0%, transparent 20%), 
                              radial-gradient(circle at 90% 80%, rgba(2, 132, 199, 0.1) 0%, transparent 20%);
            color: #f8fafc; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .glass-panel { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(16px); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 4px 60px rgba(0, 0, 0, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
        }
        .logo-box {
            background: linear-gradient(135deg, #0284c7, #38bdf8);
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
            margin: 0 auto 20px;
            box-shadow: 0 8px 16px rgba(56, 189, 248, 0.3);
        }
        h1 { margin: 0 0 10px; font-size: 24px; color: #fff; letter-spacing: -0.5px; }
        p { margin: 0 0 30px; font-size: 14px; color: #94a3b8; line-height: 1.5; }
        input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 20px; 
            border: 1px solid #334155; 
            border-radius: 12px; 
            background: rgba(15, 23, 42, 0.6); 
            color: #fff; 
            font-size: 15px; 
            box-sizing: border-box; 
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #38bdf8; }
        button { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #0ea5e9, #38bdf8); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            box-sizing: border-box; 
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }
        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.4);
        }
        button:disabled { 
            background: #475569; 
            cursor: not-allowed; 
            transform: none;
            box-shadow: none;
        }
        #status { 
            margin-top: 24px; 
            font-size: 14px; 
            display: none; 
            padding: 12px; 
            border-radius: 8px; 
            font-weight: 500;
        }
        .success { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
        .error { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
    </style>
</head>
<body>

<div class="glass-panel">
    <div class="logo-box">N</div>
    <h1>Nokrify Scraper</h1>
    <p>Manually run the ScrapingDog automation to fetch strictly filtered HR contact leads.</p>
    
    <input type="password" id="patToken" placeholder="Enter Secure Password..." autocomplete="off">
    <button id="runBtn" onclick="triggerWorkflow()">🚀 Start Extraction</button>
    
    <div id="status"></div>
</div>

<script>
    async function triggerWorkflow() {
        const token = document.getElementById("patToken").value.trim();
        const btn = document.getElementById("runBtn");
        const statusEl = document.getElementById("status");
        
        if (!token) {
            statusEl.className = "error";
            statusEl.innerHTML = "Password required.";
            statusEl.style.display = "block";
            return;
        }

        // Nokrify Repository Info
        const OWNER = "Satyarth-0330";
        const REPO = "Nokrify-Daily-Leads";
        const WORKFLOW_ID = "daily_scraper.yml";

        btn.disabled = true;
        btn.innerHTML = "Deploying Engine...";
        statusEl.style.display = "none";

        try {
            const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW_ID}/dispatches`, {
                method: "POST",
                headers: {
                    "Accept": "application/vnd.github.v3+json",
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json",
                    "X-GitHub-Api-Version": "2022-11-28"
                },
                body: JSON.stringify({ "ref": "main" })
            });

            if (response.status === 204) {
                statusEl.className = "success";
                statusEl.innerHTML = "✅ Deployment Successful! Check Google Sheets shortly.";
                document.getElementById("patToken").value = "";
            } else {
                const data = await response.json();
                statusEl.className = "error";
                statusEl.innerHTML = `❌ Error: ${data.message || 'Authentication Failed. Wrong password?'}`;
            }
        } catch (error) {
            statusEl.className = "error";
            statusEl.innerHTML = `❌ Connection Error -> ${error.message}`;
        }
        
        statusEl.style.display = "block";
        btn.disabled = false;
        btn.innerHTML = "🚀 Start Extraction";
    }
</script>

</body>
</html>
